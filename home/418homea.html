<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="418home.css" />
    <title>Document</title>
  </head>
  <body>
    <div type="text" id="display" readonly></div>
    <div class="keys">
      <button onclick="pressOne('1')">1</button>
      <button onclick="pressTwo('2')">2</button>
      <button onclick="pressThree('3')">3</button>
      <button onclick="pressFour('4')">4</button>
      <button onclick="pressFive('5')">5</button>
      <button onclick="pressSix('6')">6</button>
      <button onclick="pressSeven('7')">7</button>
      <button onclick="pressEight('8')">8</button>
      <button onclick="pressNine('9')">9</button>
      <button onclick="pressZero('0')">0</button>
      <button onclick="pressDot('.')">.</button>
      <button onclick="pressPlus('+')">+</button>
      <button onclick="pressMinus('-')">-</button>
      <button onclick="pressMultiply('*')">*</button>
      <button onclick="pressDivide('/')">/</button>
      <br />
      <button onclick="calculate()">=</button>
      <button onclick="clearScreen()">C</button>
    </div>

    <script src="./418home.js"></script>
  </body>
</html>
